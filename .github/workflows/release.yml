name: Create Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Pre-release Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate script syntax
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path . -Filter "*.ps1"
          $hasErrors = $false

          foreach ($script in $scripts) {
            Write-Host "Checking: $($script.Name)" -ForegroundColor Cyan
            try {
              $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content $script.FullName -Raw), [ref]$null)
              Write-Host "  OK" -ForegroundColor Green
            } catch {
              Write-Host "  ERROR: $_" -ForegroundColor Red
              $hasErrors = $true
            }
          }

          if ($hasErrors) {
            throw "One or more scripts have syntax errors"
          }

      - name: Verify all required files exist
        shell: pwsh
        run: |
          $required = @(
            "Install.ps1",
            "Privacy-Audit.ps1",
            "Disable-WindowsTelemetry.ps1",
            "Disable-OfficeTelemetry.ps1",
            "Disable-PowerShellTelemetry.ps1",
            "README.md",
            "CHANGELOG.md"
          )

          $missing = @()
          foreach ($file in $required) {
            if (!(Test-Path $file)) {
              $missing += $file
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required files: $($missing -join ', ')"
          }

          Write-Host "All required files present" -ForegroundColor Green

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release ZIP
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p release

          cp Install.ps1 release/
          cp Privacy-Audit.ps1 release/
          cp Disable-WindowsTelemetry.ps1 release/
          cp Disable-OfficeTelemetry.ps1 release/
          cp Disable-PowerShellTelemetry.ps1 release/
          cp README.md release/
          cp LICENSE release/ 2>/dev/null || echo "No LICENSE file"

          cd release
          zip -r ../Windows-Privacy-Toolkit-${TAG}.zip .
          zip -r ../Windows-Privacy-Toolkit.zip .
          cd ..

      - name: Generate Release Notes from CHANGELOG
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"  # strip leading 'v'

          CHANGES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)

          if [ -z "$CHANGES" ]; then
            CHANGES="See [CHANGELOG.md](https://github.com/NX1X/Windows-Privacy-Toolkit/blob/main/CHANGELOG.md) for details."
          fi

          cat << EOF > RELEASE_NOTES.md
          ## What's New in ${TAG}

          $CHANGES

          ---

          ## Installation

          **Quick Install (Recommended):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/NX1X/Windows-Privacy-Toolkit/main/Quick-Install.ps1 | iex
          \`\`\`

          **Manual Install:**
          1. Download \`Windows-Privacy-Toolkit-${TAG}.zip\`
          2. Extract to a folder
          3. Right-click \`Install.ps1\` → Run with PowerShell (admin)

          ## Compatibility
          - ✅ **Windows 11** (tested)
          - ⚠️ **Windows 10** (should work, not tested)

          ## Resources
          - 📋 [Full Changelog](https://github.com/NX1X/Windows-Privacy-Toolkit/blob/main/CHANGELOG.md)
          - 📚 [Documentation](https://docs.nx1xlab.dev)
          - 💻 [GitHub Repository](https://github.com/NX1X/Windows-Privacy-Toolkit)

          ---
          **Author:** NX1X | [nx1xlab.dev](https://www.nx1xlab.dev)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            Windows-Privacy-Toolkit-${{ steps.version.outputs.tag }}.zip
            Windows-Privacy-Toolkit.zip
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ inputs.prerelease == true }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
