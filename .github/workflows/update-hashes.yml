name: Update Script Hashes

on:
  push:
    branches: [main]
    paths:
      - 'Install.ps1'
      - 'Privacy-Audit.ps1'
      - 'Disable-WindowsTelemetry.ps1'
      - 'Disable-OfficeTelemetry.ps1'
      - 'Disable-PowerShellTelemetry.ps1'

jobs:
  update-hashes:
    name: Recompute and Commit Hashes
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Compute SHA256 hashes and update Quick-Install.ps1
        shell: pwsh
        run: |
          $scripts = @(
            "Install.ps1",
            "Privacy-Audit.ps1",
            "Disable-WindowsTelemetry.ps1",
            "Disable-OfficeTelemetry.ps1",
            "Disable-PowerShellTelemetry.ps1"
          )

          $content = Get-Content "Quick-Install.ps1" -Raw

          foreach ($script in $scripts) {
            $hash = (Get-FileHash $script -Algorithm SHA256).Hash
            $escapedName = [Regex]::Escape($script)
            $content = $content -replace "(`"$escapedName`"\s*=\s*`")[A-F0-9]{64}`"", "`${1}$hash`""
            Write-Host "  $script => $hash"
          }

          Set-Content "Quick-Install.ps1" -Value $content -NoNewline

      - name: Commit updated hashes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Quick-Install.ps1
          git diff --staged --quiet || git commit -m "chore: update script hashes [skip ci]"
          git push
